<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>Kalkal Club</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            padding: 30px;
        }

        input {
            width: 250px;
            padding: 10px;
            margin: 5px;
            font-size: 16px;
        }

        button {
            padding: 10px 30px;
            margin: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 20px auto;
            max-width: 400px;
            border-radius: 10px;
        }
    </style>

</head>


<body>

<div style="font-size:45px;">
👩 🧑 👨 👩
<br>
👑
</div>

<h1>کال‌کال کلاب</h1>

<div class="box">

<h2>ثبت نام</h2>

<input id="username" placeholder="نام کاربری">

<br>

<input id="password" 
type="password" 
maxlength="4"
placeholder="رمز ۴ رقمی">


<br>

<input id="confirmPassword"
type="password"
maxlength="4"
placeholder="تکرار رمز ۴ رقمی">


<br>

<button onclick="register()">
ثبت نام
</button>

</div>



<div class="box">

<h2>ورود</h2>

<input id="loginUsername" placeholder="نام کاربری">

<br>

<input id="loginPassword"
type="password"
maxlength="4"
placeholder="رمز ۴ رقمی">


<br>

<button onclick="login()">
ورود
</button>


</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>

<script src="auth.js"></script>


</body>

</html>
